name: Release to npm

on:
  push:
    branches:
      - main
    paths:
      - package.json
  workflow_dispatch:

concurrency:
  group: npm-publish-margins-cli
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Read version
        id: version
        run: |
          VERSION=$(node -e "process.stdout.write(require('./package.json').version)")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "CLI version: $VERSION"

      - name: Check if exact version already published
        id: check
        run: |
          # Check if this exact version exists on npm (not just latest tag)
          if npm view "margins-cli@${{ steps.version.outputs.version }}" version >/dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Version ${{ steps.version.outputs.version }} already on npm, skipping"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            LATEST=$(npm view margins-cli version 2>/dev/null || echo "0.0.0")
            echo "Publishing ${{ steps.version.outputs.version }} (npm latest: $LATEST)"
          fi

      - name: Install dependencies
        if: steps.check.outputs.skip == 'false'
        run: npm ci

      - name: Build
        if: steps.check.outputs.skip == 'false'
        run: npm run build

      - name: Publish to npm
        if: steps.check.outputs.skip == 'false'
        run: npm publish --access public --provenance
